<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #ffffff; }
      .foreground { fill: #1a1a1a; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #1a1a1a; }
      .foreground { fill: #ffffff; }
    }
  </style>
  <rect class="background" width="180" height="180" />
  <g transform="translate(90, 90)">
    <text class="foreground" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" dominant-baseline="central">LifeOS</text>
  </g>
</svg>
